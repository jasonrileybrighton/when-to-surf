<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>When to Surf - Wave Forecasting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .wave-emoji {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .setup-section {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .setup-section h3 {
            color: #856404;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .setup-section p {
            color: #856404;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .api-key-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ffc107;
            border-radius: 5px;
            font-size: 12px;
            margin-bottom: 10px;
            font-family: monospace;
        }

        .api-key-input::placeholder {
            color: #999;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-btn {
            background: #f0f0f0;
            color: #333;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .response-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .response-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .response-box {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            line-height: 1.6;
            color: #555;
            max-height: 400px;
            overflow-y: auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #667eea;
            font-weight: 500;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-box {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 20px;
            border-radius: 10px;
            color: #c62828;
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="wave-emoji">🏄‍♂️</span>
            <h1>When to Surf</h1>
            <p class="subtitle">AI-powered wave forecasting</p>
        </div>

        <div class="setup-section">
            <h3>⚙️ Setup Required</h3>
            <p>Paste your Claude API key below. Get it from <a href="https://console.anthropic.com" target="_blank" style="color: #856404;">console.anthropic.com</a></p>
            <input 
                type="password" 
                id="apiKey" 
                class="api-key-input"
                placeholder="Paste your API key here (starts with sk-ant-)"
            >
        </div>

        <form id="surfForm">
            <div class="form-group">
                <label for="location">Location or Beach Name</label>
                <input 
                    type="text" 
                    id="location" 
                    placeholder="e.g., Malibu, Hawaii, Bali"
                    required
                >
            </div>

            <div class="form-group">
                <label for="details">Tell me about conditions you're interested in</label>
                <textarea 
                    id="details" 
                    placeholder="e.g., Best time this week? What about swell direction? Current conditions?"
                    required
                ></textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="submit-btn">Get Forecast</button>
                <button type="button" class="clear-btn" onclick="clearForm()">Clear</button>
            </div>
        </form>

        <div id="responseSection" class="response-section hidden">
            <div class="response-title">
                <span>📊 Forecast</span>
            </div>
            <div id="responseBox" class="response-box"></div>
        </div>

        <div class="footer">
            Powered by Claude AI • Forecasts based on general knowledge
        </div>
    </div>

    <script>
        const form = document.getElementById('surfForm');
        const responseSection = document.getElementById('responseSection');
        const responseBox = document.getElementById('responseBox');
        const submitBtn = form.querySelector('.submit-btn');
        const apiKeyInput = document.getElementById('apiKey');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                responseBox.innerHTML = `
                    <div class="error-box">
                        <strong>Error:</strong> Please paste your Claude API key first
                    </div>
                `;
                responseSection.classList.remove('hidden');
                return;
            }

            const location = document.getElementById('location').value;
            const details = document.getElementById('details').value;

            responseSection.classList.remove('hidden');
            responseBox.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Analyzing conditions...
                </div>
            `;
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/forecast', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        location: location,
                        details: details,
                        apiKey: apiKey
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to get forecast');
                }

                responseBox.innerHTML = formatResponse(data.forecast);
            } catch (error) {
                responseBox.innerHTML = `
                    <div class="error-box">
                        <strong>Error:</strong> ${error.message || 'Failed to get forecast'}
                    </div>
                `;
            } finally {
                submitBtn.disabled = false;
            }
        });

        function formatResponse(text) {
            let html = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            
            if (!html.startsWith('<p>')) {
                html = '<p>' + html;
            }
            if (!html.endsWith('</p>')) {
                html = html + '</p>';
            }
            
            return html;
        }

        function clearForm() {
            document.getElementById('location').value = '';
            document.getElementById('details').value = '';
            responseSection.classList.add('hidden');
            document.getElementById('location').focus();
        }
    </script>
</body>
</html>
