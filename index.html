<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakerbot - Hot Pipe Surf Forecast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f4c75 0%, #1a5f7a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 50px;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #0f4c75;
            padding-bottom: 20px;
        }
        .wave-emoji {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }
        h1 {
            color: #0f4c75;
            font-size: 48px;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .location-info {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
        }
        .subtitle {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
        .setup-section {
            background: #e8f4f8;
            border-left: 4px solid #0f4c75;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .setup-section h3 {
            color: #0f4c75;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .setup-section p {
            color: #555;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .api-key-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #0f4c75;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 10px;
            font-family: monospace;
        }
        .api-key-input::placeholder {
            color: #bbb;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .setup-btn, .fetch-button, .clear-key-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .setup-btn {
            background: linear-gradient(135deg, #0f4c75 0%, #1a5f7a 100%);
            color: white;
        }
        .setup-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(15, 76, 117, 0.3);
        }
        .setup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .fetch-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0f4c75 0%, #1a5f7a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .fetch-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(15, 76, 117, 0.3);
        }
        .fetch-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .clear-key-btn {
            background: #f0f0f0;
            color: #333;
            font-size: 12px;
            padding: 8px 12px;
            margin-top: 10px;
        }
        .clear-key-btn:hover {
            background: #e0e0e0;
        }
